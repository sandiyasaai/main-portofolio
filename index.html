<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Portfolio Pande I Gede Sandiyasa sebagai web developer yang berfokus pada aplikasi web dan sistem informasi.">
  <title>Pande I Gede Sandiyasa | Web Developer</title>

  <link rel="shortcut icon" href="./assets/images/logo.ico" type="image/x-icon">
  <link rel="stylesheet" href="./assets/css/style.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
  <main>
    <aside class="sidebar" data-sidebar>
      <div class="sidebar-info">
        <figure class="avatar-box">
          <img src="./assets/images/my-avatar.png" alt="Pande I Gede Sandiyasa" width="96" data-profile-avatar>
        </figure>

        <div class="info-content">
          <h1 class="name" title="Pande I Gede Sandiyasa" data-profile-name>Pande I Gede Sandiyasa</h1>
          <p class="title" data-profile-title>Web Developer</p>
        </div>

        <button class="info_more-btn" type="button" data-sidebar-btn aria-expanded="false" aria-controls="sidebar-extra">
          <span>Tampilkan Kontak</span>
          <ion-icon name="chevron-down"></ion-icon>
        </button>
      </div>

      <div class="sidebar-info_more" id="sidebar-extra">
        <div class="separator"></div>
        <ul class="contacts-list" data-contacts-list></ul>
        <div class="separator" data-social-separator hidden></div>
        <ul class="social-list" data-social-list hidden></ul>
      </div>
    </aside>

    <div class="main-content">
      <nav class="navbar">
        <ul class="navbar-list">
          <li class="navbar-item">
            <button class="navbar-link active" type="button" data-nav-link="about">Tentang</button>
          </li>
          <li class="navbar-item">
            <button class="navbar-link" type="button" data-nav-link="resume">Resume</button>
          </li>
          <li class="navbar-item">
            <button class="navbar-link" type="button" data-nav-link="portfolio">Proyek</button>
          </li>
          <li class="navbar-item">
            <button class="navbar-link" type="button" data-nav-link="contact">Kontak</button>
          </li>
        </ul>
      </nav>

      <article class="about active" data-page="about">
        <header>
          <h2 class="h2 article-title">Tentang Saya</h2>
        </header>

        <section class="about-text" data-about-text></section>

        <section class="service">
          <h3 class="h3 section-subtitle">Yang Saya Kerjakan</h3>
          <ul class="service-list" data-services-list></ul>
        </section>
      </article>

      <article class="resume" data-page="resume">
        <header>
          <h2 class="h2 article-title">Resume</h2>
        </header>

        <section class="timeline" data-education-section hidden>
          <div class="title-wrapper">
            <div class="icon-box">
              <ion-icon name="school-outline"></ion-icon>
            </div>
            <h3 class="h3 section-subtitle">Pendidikan</h3>
          </div>

          <ol class="timeline-list" data-education-list></ol>
        </section>

        <section class="timeline" data-experience-section hidden>
          <div class="title-wrapper">
            <div class="icon-box">
              <ion-icon name="briefcase-outline"></ion-icon>
            </div>
            <h3 class="h3 section-subtitle">Pengalaman</h3>
          </div>

          <ol class="timeline-list" data-experience-list></ol>
        </section>

        <section class="skill" data-skills-section hidden>
          <h3 class="h3 section-subtitle">Keahlian</h3>
          <ul class="skills-list content-card" data-skills-list></ul>
        </section>
      </article>

      <article class="portfolio" data-page="portfolio">
        <header>
          <h2 class="h2 article-title">Proyek</h2>
        </header>

        <section class="projects">
          <ul class="filter-list" data-filter-list></ul>

          <div class="filter-select-box">
            <button class="filter-select" type="button" data-select aria-expanded="false" aria-haspopup="listbox">
              <span class="select-value" data-select-value>Pilih kategori</span>
              <span class="select-icon">
                <ion-icon name="chevron-down"></ion-icon>
              </span>
            </button>

            <ul class="select-list" data-select-list role="listbox"></ul>
          </div>

          <ul class="project-list" data-project-list></ul>
        </section>

        <div class="modal-container" data-portfolio-modal-container hidden>
          <div class="overlay" data-portfolio-overlay></div>

          <section class="portfolio-modal" id="portfolio-modal" role="dialog" aria-modal="true" aria-labelledby="portfolio-modal-title">
            <button class="modal-close-btn" type="button" data-portfolio-modal-close-btn aria-label="Tutup detail proyek">
              <ion-icon name="close-outline"></ion-icon>
            </button>

            <figure class="portfolio-modal-media">
              <img src="./assets/images/project-1.jpg" alt="" data-portfolio-modal-img>
            </figure>

            <div class="portfolio-modal-content">
              <h3 class="h3 portfolio-modal-title" id="portfolio-modal-title" data-portfolio-modal-title></h3>

              <div class="project-meta">
                <p class="project-meta-label" data-portfolio-modal-category></p>
                <span class="meta-dot"></span>
                <a class="portfolio-modal-link" href="https://siedu.web.id" target="_blank" rel="noopener noreferrer" data-portfolio-modal-link>
                  <ion-icon name="link-outline"></ion-icon>
                  <span data-portfolio-modal-link-label>Buka proyek</span>
                </a>
              </div>

              <div class="portfolio-modal-body" data-portfolio-modal-text></div>
            </div>
          </section>
        </div>
      </article>

      <article class="contact" data-page="contact">
        <header>
          <h2 class="h2 article-title">Kontak</h2>
        </header>

        <section class="contact-copy content-card">
          <h3 class="h3 section-subtitle" data-contact-copy-title></h3>
          <p data-contact-copy-text></p>
          <a class="contact-copy-link" href="mailto:codepansya@gmail.com" data-contact-copy-link></a>
        </section>

        <section class="contact-form">
          <h3 class="h3 section-subtitle">Kirim Pesan</h3>

          <form class="form" data-form>
            <div class="input-wrapper">
              <input type="text" name="name" class="form-input" placeholder="Nama lengkap" required autocomplete="name" aria-label="Nama lengkap" data-form-input>
              <input type="email" name="email" class="form-input" placeholder="Alamat email" required autocomplete="email" aria-label="Alamat email" data-form-input>
            </div>

            <textarea name="message" class="form-input" placeholder="Ceritakan kebutuhan Anda" required aria-label="Pesan" data-form-input></textarea>

            <button class="form-btn" type="submit" disabled data-form-btn>
              <ion-icon name="paper-plane-outline"></ion-icon>
              <span>Kirim Pesan</span>
            </button>
          </form>
        </section>
      </article>
    </div>
  </main>

  <script type="module" src="./assets/js/script.js"></script>
  <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>
</body>

</html>
